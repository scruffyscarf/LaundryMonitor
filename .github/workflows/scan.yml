name: Container Security Scan

permissions:
  contents: read
  security-events: write
  actions: write
  packages: read

on:
  push:
#     branches: [ main ]
#   pull_request:
#     branches: [ main ]

jobs:
  Scan:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        load: true
        tags: laundry-monitor:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}

    # ========== 1. TRIVY ==========
    - name: Scan with Trivy
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: laundry-monitor:latest
        format: 'sarif'
        output: 'trivy.sarif'
        ignore-unfixed: false
 
    - name: Upload Trivy SARIF artifact
      uses: actions/upload-artifact@v4
      with:
        name: trivy-results
        path: trivy.sarif

    - name: Upload Trivy results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: trivy.sarif
        category: trivy
    
    # ========== 2. SYFT + GRYPE ==========
    - name: Install Syft and Grype
      run: |
        curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
        curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
    
    - name: Generate SBOM with Syft
      run: |
        syft laundry-monitor:latest -o spdx-json > sbom.spdx.json
    
    - name: Scan with Grype
      run: |
        grype sbom.spdx.json -o sarif > grype.sarif
    
    - name: Upload Syft+Grype SARIF artifact
      uses: actions/upload-artifact@v4
      with:
        name: grype-scan-results
        path: grype.sarif

    - name: Upload Syft+Grype results to GitHub Security Tab
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: grype.sarif
        category: grype
    
    # ========== 3. DOCKER SCOUT ==========
    - name: Scan with Docker Scout
      uses: docker/scout-action@v1
      with:
        command: cves, recommendations
        image: laundry-monitor:latest
        dockerhub-user: ${{ secrets.DOCKER_USERNAME }}
        dockerhub-password: ${{ secrets.DOCKER_TOKEN }}
        sarif-file: scout.sarif
        summary: true
    
    - name: Upload Docker Scout SARIF artifact
      uses: actions/upload-artifact@v4
      with:
        name: scout-results
        path: scout.sarif
    
    - name: Upload Docker Scout results to Security Tab
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: scout.sarif
        category: docker-scout

    # ========== 4. SNYK ==========
    - name: Scan with Snyk
      uses: snyk/actions/docker@master
      with:
        image: laundry-monitor:latest
        args: --sarif-file-output=snyk.raw.sarif
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      continue-on-error: true

    - name: Fix Snyk SARIF
      run: |
        sudo apt-get install -y jq
        
        jq '.runs[].tool.driver.rules |= map(
          if .properties."security-severity" == null then 
            .properties."security-severity" = 0.0 
          else 
            . 
          end
        )' snyk.raw.sarif > snyk.sarif

    - name: Upload Snyk results to GitHub Security Tab
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: snyk.sarif
        category: Snyk
