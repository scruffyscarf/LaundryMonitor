repos:
  - repo: https://github.com/PyCQA/flake8
    rev: 7.1.1
    hooks:
      - id: flake8
        name: flake8
        args: ["backend/src", "backend/tests", "frontend/src", "frontend/tests"]
        pass_filenames: false

  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.3
    hooks:
      - id: bandit
        name: bandit
        args: ["-r", "backend/src", "-ll"]
        pass_filenames: false
